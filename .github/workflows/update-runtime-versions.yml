name: Update Runtime Versions

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check for runtime updates
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bash ./.github/scripts/update-runtime-versions.sh

      - name: Verify module evaluates
        if: steps.check.outputs.updated == 'true'
        run: nix eval --json '.#darwinModules' --apply builtins.attrNames

      - name: Create Pull Request
        if: steps.check.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          APPLE_UPDATED: ${{ steps.check.outputs.apple_updated }}
          APPLE_VERSION: ${{ steps.check.outputs.apple_version }}
          CURRENT_APPLE_VERSION: ${{ steps.check.outputs.current_apple_version }}
          SOCKTAINER_UPDATED: ${{ steps.check.outputs.socktainer_updated }}
          SOCKTAINER_VERSION: ${{ steps.check.outputs.socktainer_version }}
          CURRENT_SOCKTAINER_VERSION: ${{ steps.check.outputs.current_socktainer_version }}
          NIX_UPDATED: ${{ steps.check.outputs.nix_updated }}
          NIX_VERSION: ${{ steps.check.outputs.nix_version }}
          CURRENT_NIX_VERSION: ${{ steps.check.outputs.current_nix_version }}
        run: |
          set -euo pipefail

          branch=auto/runtime-version-update
          subject='${{ steps.check.outputs.subject }}'

          body_file=$(mktemp)
          {
            printf '%s\n' 'Automated update of default runtime versions.'
            printf '\n'
            if [ "$APPLE_UPDATED" = 'true' ]; then
              printf '%s\n' "- Apple Container: \`${CURRENT_APPLE_VERSION}\` -> \`${APPLE_VERSION}\`"
            fi
            if [ "$SOCKTAINER_UPDATED" = 'true' ]; then
              printf '%s\n' "- Socktainer: \`${CURRENT_SOCKTAINER_VERSION}\` -> \`${SOCKTAINER_VERSION}\`"
            fi
            if [ "$NIX_UPDATED" = 'true' ]; then
              printf '%s\n' "- nixos/nix: \`${CURRENT_NIX_VERSION}\` -> \`${NIX_VERSION}\`"
            fi
          } > "$body_file"

          git checkout -B "$branch"
          git add modules/runtime-versions.nix .github/scripts/update-runtime-versions.sh
          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' commit -m "$subject"
          git push --force-with-lease --set-upstream origin "$branch"

          pr_number=$(gh pr list --head "$branch" --json number --jq '.[0].number // empty')

          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --title "$subject" --body-file "$body_file"
          else
            gh pr create --base main --head "$branch" --title "$subject" --body-file "$body_file"
          fi
