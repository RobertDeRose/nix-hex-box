name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install dependencies
        run: npm clean-install

      - name: Verify npm signatures
        run: npm audit signatures

      - name: Ensure initial release tag
        run: |
          if git rev-parse "v0.0.0" >/dev/null 2>&1; then
            exit 0
          fi

          root_commit=$(git rev-list --max-parents=0 HEAD)
          git tag v0.0.0 "$root_commit"
          git push origin v0.0.0

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
