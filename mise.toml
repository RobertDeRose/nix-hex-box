# schema
[settings]
experimental = true
env_shell_expand = true

[tools]
actionlint = "latest"
hadolint = "latest"
hk = { version = "1.41", arch = "aarch64" }
mdbook = "0.5.2"
node = "lts"
pkl = "latest"
shellcheck = "latest"
shfmt = "latest"
tombi = "latest"
typos = "latest"
"nix:nixfmt" = "1.2.0"
"npm:@commitlint/cli" = "20.5.3"
"npm:semantic-release" = "25.0.3"
"npm:conventional-changelog-conventionalcommits" = "9.3.1"
"npm:@semantic-release/commit-analyzer" = "13.0.1"
"npm:@semantic-release/github" = "12.0.6"
"npm:@semantic-release/release-notes-generator" = "14.1.0"
"pipx:commitizen" = "latest"

[env]
HK_MISE = 1

[hooks]
postinstall = "command -v hk >/dev/null && hk install --mise || true"

[tasks."docs:build"]
description = "Build the documentation site (mdBook)"
quiet = true
run = '''
#!/usr/bin/env bash
set -euo pipefail

cd docs
mdbook build
'''

[tasks."docs:serve"]
description = "Serve the documentation site locally with hot-reload"
quiet = true
usage = 'arg "[port]" help="Port to serve on" default="3000"'
run = '''
#!/usr/bin/env bash
set -euo pipefail

PORT="${usage_port:-3000}"

cd docs
mdbook serve --port "$PORT"
'''
